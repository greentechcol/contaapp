<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>ContaApp — Negocio</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, addDoc, onSnapshot, collection, deleteDoc, query, orderBy, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBRcdPOgC3jU4Br81r3lC5KK2ZowBSns80",
      authDomain: "contaappgreentech.firebaseapp.com",
      projectId: "contaappgreentech",
      storageBucket: "contaappgreentech.firebasestorage.app",
      messagingSenderId: "672661191582",
      appId: "1:672661191582:web:babf8b97b69925028eb48f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.__FB = { 
      auth, db, GoogleAuthProvider, signInWithPopup, 
      signInWithEmailAndPassword, createUserWithEmailAndPassword, 
      onAuthStateChanged, signOut, doc, getDoc, setDoc, addDoc,
      onSnapshot, collection, deleteDoc, query, orderBy, writeBatch 
    };
    window.__fbReady = true;
    window.dispatchEvent(new Event('firebase-ready'));
  </script>
</head>
<body class="theme-business">

  <div id="loading" class="loading-overlay" style="position:fixed; inset:0; background:white; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:2000;">
    <div class="spinner" style="width:40px; height:40px; border:4px solid #f1f5f9; border-top-color:#2563eb; border-radius:50%; animation:spin 1s linear infinite;"></div>
    <p style="margin-top:1rem; color:#64748b;">Sincronizando datos...</p>
  </div>

  <header class="topbar">
    <a href="index.html" class="brand">
      <span class="brand-logo">📒</span>
      <span class="brand-name">Negocio</span>
    </a>
    <div class="nav-tabs" id="mainNav">
      <a href="#" class="tab-link active" data-tab="resumen">Resumen</a>
      <a href="#" class="tab-link" data-tab="movimientos">Movimientos</a>
      <a href="#" class="tab-link" data-tab="categorias">Categorías</a>
      <a href="#" class="tab-link" data-tab="reportes">Reportes</a>
    </div>
    <div class="flex items-center gap-2" style="margin-left:auto">
      <div class="user-chip">
        <div class="user-avatar" id="userAvatar">U</div>
      </div>
      <button class="btn btn-secondary btn-sm" id="btnLogout">🚪</button>
    </div>
  </header>

  <main class="container">
    <!-- SECCIÓN RESUMEN -->
    <div id="tab-resumen" class="tab-content">
      <div class="card">
        <h2 class="section-title mb-4">Control de Saldos</h2>
        <div class="grid" id="cardsGrid" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:1rem;">
          <!-- Cargado dinámicamente -->
        </div>
      </div>

      <div class="card">
        <h2 class="section-title mb-4">Estado de Resultados</h2>
        <div class="table-wrap">
          <table class="table">
            <tbody id="erTableBody">
              <!-- Cargado dinámicamente -->
            </tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <h2 class="section-title mb-4">Flujo Mensual</h2>
        <div style="height:300px">
          <canvas id="chartFlujo"></canvas>
        </div>
      </div>
    </div>

    <!-- SECCIÓN MOVIMIENTOS -->
    <div id="tab-movimientos" class="tab-content hidden">
      <div class="card">
        <h2 class="section-title mb-4">Nuevo Movimiento</h2>
        <form id="formMovimiento">
          <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap:1rem;">
            <div class="form-group">
              <label class="label">Fecha</label>
              <input type="date" id="movFecha" class="input" required>
            </div>
            <div class="form-group">
              <label class="label">Tipo</label>
              <select id="movTipo" class="input" required>
                <option value="Ingreso">💰 Ingreso</option>
                <option value="Gasto">💸 Gasto</option>
                <option value="Compra">🛒 Compra</option>
              </select>
            </div>
            <div class="form-group">
              <label class="label">Categoría</label>
              <select id="movCategoria" class="input" required></select>
            </div>
            <div class="form-group">
              <label class="label">Monto</label>
              <input type="number" id="movMonto" class="input" placeholder="0.00" step="0.01" required>
            </div>
          </div>
          <div class="form-group mt-4">
            <label class="label">Descripción</label>
            <input type="text" id="movDescripcion" class="input" placeholder="Ej: Venta de producto X">
          </div>
          <button type="submit" class="btn btn-primary w-100 mt-2" style="width:100%">Guardar Movimiento</button>
        </form>
      </div>

      <div class="card">
        <div class="flex justify-between items-center mb-4">
          <h2 class="section-title">Historial</h2>
          <button class="btn btn-secondary btn-sm" id="btnExportExcel">Excel 📥</button>
        </div>
        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th>Fecha</th>
                <th>Tipo</th>
                <th>Descripción</th>
                <th>Monto</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tbodyMovimientos">
              <!-- Cargado dinámicamente -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script type="module">
    const $ = id => document.getElementById(id);
    let DB = { movimientos: [], categorias: [], cuentas: [], saldosIniciales: {} };
    let chartFlujo = null;

    // ✅ Valores por defecto para cuentas nuevas
    const defaultCategorias = ['Ventas', 'Servicios', 'Proveedores', 'Gastos Operativos', 'Nómina', 'Otros'];
    const defaultCuentas = [{ id: 'caja', nombre: 'Caja' }, { id: 'banco', nombre: 'Banco' }];

    window.addEventListener('firebase-ready', () => {
      const FB = window.__FB;
      
      // Manejo de Pestañas
      document.querySelectorAll('.tab-link').forEach(link => {
        link.onclick = (e) => {
          e.preventDefault();
          document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
          link.classList.add('active');
          $(`tab-${link.dataset.tab}`).classList.remove('hidden');
        };
      });

      FB.onAuthStateChanged(FB.auth, user => {
        if (!user) {
          window.location.href = 'index.html';
        } else {
          $('userAvatar').textContent = (user.email || 'U')[0].toUpperCase();
          initData(user.uid);
        }
      });

      $('btnLogout').onclick = () => FB.signOut(FB.auth);
    });

    async function initData(uid) {
      const FB = window.__FB;

      // ✅ FIX #1: Rutas absolutas de Firestore (v10 no acepta doc ref como base para doc())
      const configRef = FB.doc(FB.db, 'users', uid, 'config', 'negocio');

      // ✅ FIX #2: Ocultar loading aquí, ANTES de los listeners,
      //    por si la cuenta es nueva y las colecciones están vacías.
      $('loading').style.display = 'none';

      // Cargar Configuración (Categorías, Cuentas, Saldos Iniciales)
      FB.onSnapshot(configRef, (snap) => {
        if (snap.exists()) {
          const data = snap.data();
          DB.categorias = data.categorias || defaultCategorias;
          DB.cuentas = data.cuentas || defaultCuentas;
          DB.saldosIniciales = data.saldosIniciales || {};
        } else {
          // Cuenta nueva: usar valores por defecto
          DB.categorias = defaultCategorias;
          DB.cuentas = defaultCuentas;
        }
        updateUI();
      }, (err) => {
        console.error('Error config negocio:', err);
        DB.categorias = defaultCategorias;
        DB.cuentas = defaultCuentas;
        updateUI();
      });

      // Cargar Movimientos con ruta absoluta
      const movQuery = FB.query(
        FB.collection(FB.db, 'users', uid, 'movimientos_negocio'),
        FB.orderBy('fecha', 'desc')
      );
      FB.onSnapshot(movQuery, (snap) => {
        DB.movimientos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        updateUI();
      }, (err) => {
        console.error('Error movimientos negocio:', err);
        updateUI();
      });
    }

    function updateUI() {
      renderResumen();
      renderMovimientos();
      renderSelects();
    }

    function renderResumen() {
      const grid = $('cardsGrid');
      const erBody = $('erTableBody');
      
      // Cálculo de saldos por cuenta
      const saldos = {};
      DB.cuentas.forEach(c => saldos[c.nombre] = DB.saldosIniciales[c.id] || 0);
      
      let totalIngresos = 0, totalEgresos = 0;
      
      DB.movimientos.forEach(m => {
        const monto = parseFloat(m.monto) || 0;
        if (m.tipo === 'Ingreso') {
          totalIngresos += monto;
          if (m.cuenta && saldos[m.cuenta] !== undefined) saldos[m.cuenta] += monto;
        } else {
          totalEgresos += monto;
          if (m.cuenta && saldos[m.cuenta] !== undefined) saldos[m.cuenta] -= monto;
        }
      });

      // Renderizar Tarjetas de Saldo
      grid.innerHTML = Object.entries(saldos).map(([nombre, monto]) => `
        <div class="card" style="padding:1rem; border-left:4px solid #2563eb">
          <p style="font-size:0.75rem; color:#64748b; font-weight:600">${nombre}</p>
          <h3 style="font-size:1.25rem; font-weight:800">$${monto.toLocaleString()}</h3>
        </div>
      `).join('');

      // Renderizar Estado de Resultados
      erBody.innerHTML = `
        <tr><td>Ingresos Totales</td><td style="color:green; font-weight:700">$${totalIngresos.toLocaleString()}</td></tr>
        <tr><td>Egresos Totales</td><td style="color:red; font-weight:700">-$${totalEgresos.toLocaleString()}</td></tr>
        <tr style="border-top:2px solid #e2e8f0">
          <td style="font-weight:800">Utilidad Neta</td>
          <td style="font-weight:800; color:${totalIngresos - totalEgresos >= 0 ? 'green' : 'red'}">$${(totalIngresos - totalEgresos).toLocaleString()}</td>
        </tr>
      `;

      renderChart();
    }

    function renderMovimientos() {
      const tbody = $('tbodyMovimientos');
      tbody.innerHTML = DB.movimientos.map(m => `
        <tr>
          <td>${m.fecha}</td>
          <td><span class="badge badge-${m.tipo === 'Ingreso' ? 'success' : 'danger'}">${m.tipo}</span></td>
          <td>${m.descripcion || '-'}</td>
          <td style="font-weight:700; color:${m.tipo === 'Ingreso' ? 'green' : 'red'}">$${m.monto.toLocaleString()}</td>
          <td><button class="btn btn-secondary btn-sm" onclick="eliminarMovimiento('${m.id}')">🗑️</button></td>
        </tr>
      `).join('');
    }

    function renderSelects() {
      const catSelect = $('movCategoria');
      catSelect.innerHTML = DB.categorias.map(c => `<option value="${c}">${c}</option>`).join('');
    }

    function renderChart() {
      const ctx = $('chartFlujo').getContext('2d');
      if (chartFlujo) chartFlujo.destroy();
      
      const labels = ['Ingresos', 'Egresos'];
      const data = [
        DB.movimientos.filter(m => m.tipo === 'Ingreso').reduce((acc, m) => acc + m.monto, 0),
        DB.movimientos.filter(m => m.tipo !== 'Ingreso').reduce((acc, m) => acc + m.monto, 0)
      ];

      chartFlujo = new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            label: 'Flujo del Mes',
            data,
            backgroundColor: ['#22c55e', '#ef4444'],
            borderRadius: 8
          }]
        },
        options: { responsive: true, maintainAspectRatio: false }
      });
    }

    window.eliminarMovimiento = async (id) => {
      if (!confirm('¿Eliminar este movimiento?')) return;
      const FB = window.__FB;
      const uid = FB.auth.currentUser?.uid;
      if (!uid) return;
      // ✅ FIX: ruta absoluta correcta
      await FB.deleteDoc(FB.doc(FB.db, 'users', uid, 'movimientos_negocio', id));
    };

    $('formMovimiento').onsubmit = async (e) => {
      e.preventDefault();
      const FB = window.__FB;
      const uid = FB.auth.currentUser?.uid;
      if (!uid) return;
      const mov = {
        fecha: $('movFecha').value,
        tipo: $('movTipo').value,
        categoria: $('movCategoria').value,
        monto: parseFloat($('movMonto').value),
        descripcion: $('movDescripcion').value,
        cuenta: DB.cuentas[0]?.nombre || 'Caja',
        creadoEn: new Date().toISOString()
      };
      try {
        // ✅ FIX #3: addDoc genera ID automáticamente (setDoc requiere ID explícito)
        await FB.addDoc(FB.collection(FB.db, 'users', uid, 'movimientos_negocio'), mov);
        $('formMovimiento').reset();
      } catch (err) {
        console.error('Error guardando movimiento:', err);
        alert('Error al guardar: ' + err.message);
      }
    };
  </script>

  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .badge { padding: 0.25rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 700; }
    .badge-success { background: #dcfce7; color: #166534; }
    .badge-danger { background: #fee2e2; color: #991b1b; }
  </style>
</body>
</html>
