<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>ContaApp — Login</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <!-- CONFIGURACIÓN INTEGRADA PARA EVITAR ERRORES DE CARGA EN GITHUB PAGES -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, onSnapshot, collection, deleteDoc, query, orderBy, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBRcdPOgC3jU4Br81r3lC5KK2ZowBSns80",
      authDomain: "contaappgreentech.firebaseapp.com",
      projectId: "contaappgreentech",
      storageBucket: "contaappgreentech.firebasestorage.app",
      messagingSenderId: "672661191582",
      appId: "1:672661191582:web:babf8b97b69925028eb48f"
    };

    try {
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      window.__FB = { 
        auth, db, GoogleAuthProvider, signInWithPopup, 
        signInWithEmailAndPassword, createUserWithEmailAndPassword, 
        onAuthStateChanged, signOut, doc, getDoc, setDoc, 
        onSnapshot, collection, deleteDoc, query, orderBy, writeBatch 
      };
      window.__fbReady = true;
      window.dispatchEvent(new Event('firebase-ready'));
    } catch (error) {
      console.error("Error al inicializar Firebase:", error);
    }
  </script>
  
  <style>
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      min-height: 100vh;
      margin: 0;
    }
    .auth-card {
      background: white;
      border-radius: var(--radius-lg);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .auth-header { text-align: center; margin-bottom: 2rem; }
    .auth-logo { font-size: 3.5rem; margin-bottom: 0.5rem; display: block; }
    .auth-title { font-size: 2rem; font-weight: 800; color: var(--slate-900); letter-spacing: -0.025em; }
    .auth-sub { color: var(--slate-500); font-size: 0.9375rem; }

    .auth-tabs { display: flex; border-bottom: 1px solid var(--slate-200); margin-bottom: 1.5rem; }
    .auth-tab { flex: 1; padding: 0.75rem; border: none; background: none; font-weight: 600; color: var(--slate-400); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .auth-tab.active { color: var(--primary); border-bottom-color: var(--primary); }

    .error-box {
      background: var(--danger-bg);
      color: var(--danger);
      padding: 0.75rem;
      border-radius: var(--radius-sm);
      font-size: 0.8125rem;
      font-weight: 600;
      margin-bottom: 1rem;
      display: none;
      border: 1px solid #fecaca;
    }
    .error-box.show { display: block; animation: shake 0.4s ease-in-out; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .divider { display: flex; align-items: center; margin: 1.5rem 0; color: var(--slate-400); font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--slate-200); }
    .divider span { padding: 0 0.75rem; }

    .profile-selector { display: none; }
    .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1.5rem; }
    .profile-btn {
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem;
      border-radius: var(--radius);
      border: 2px solid var(--slate-100);
      background: var(--slate-50);
      transition: all 0.2s;
      text-align: center;
    }
    .profile-btn:hover { border-color: var(--brand-color); background: var(--brand-bg); transform: translateY(-4px); box-shadow: var(--shadow-md); }
    .profile-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .profile-name { font-weight: 700; color: var(--slate-900); font-size: 1rem; }
    .profile-desc { font-size: 0.75rem; color: var(--slate-500); margin-top: 0.25rem; }

    .user-info {
      margin-top: 2rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--slate-100);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .user-chip { display: flex; align-items: center; gap: 0.625rem; }
    .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.875rem; }
    .user-email { font-size: 0.8125rem; font-weight: 600; color: var(--slate-700); max-width: 140px; overflow: hidden; text-overflow: ellipsis; }

    .loading-overlay { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
    .spinner { width: 40px; height: 40px; border: 4px solid var(--slate-100); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="loading" class="loading-overlay">
    <div class="spinner"></div>
    <p class="mt-4 text-muted" id="loadingText">Cargando ContaApp...</p>
  </div>

  <div class="auth-card" id="authCard" style="display:none">
    <div class="auth-header">
      <span class="auth-logo">📒</span>
      <h1 class="auth-title">ContaApp</h1>
      <p class="auth-sub">Tus finanzas bajo control</p>
    </div>

    <div id="loginSection">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin">Entrar</button>
        <button class="auth-tab" id="tabRegister">Registro</button>
      </div>

      <div id="errorBox" class="error-box"></div>

      <form id="formAuth">
        <div class="form-group">
          <label class="label">Correo Electrónico</label>
          <input type="email" id="email" class="input" placeholder="ejemplo@correo.com" required>
        </div>
        <div class="form-group">
          <label class="label">Contraseña</label>
          <input type="password" id="password" class="input" placeholder="••••••••" required>
        </div>
        <div class="form-group" id="confirmPassGroup" style="display:none">
          <label class="label">Confirmar Contraseña</label>
          <input type="password" id="confirmPassword" class="input" placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%" id="btnSubmit">Iniciar Sesión</button>
      </form>

      <div class="divider"><span>o continúa con</span></div>
      <button class="btn btn-secondary" style="width:100%" id="btnGoogle">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3L37.3 9.6C34.1 6.7 29.3 5 24 5 12.4 5 3 14.4 3 26s9.4 21 21 21 21-9.4 21-21c0-1.3-.1-2.6-.4-3.9z"/><path fill="#FF3D00" d="M6.3 15.1l6.6 4.8C14.5 16 19 13 24 13c3.1 0 5.8 1.1 7.9 3L37.3 9.6C34.1 6.7 29.3 5 24 5 16.3 5 9.7 9.1 6.3 15.1z"/><path fill="#4CAF50" d="M24 47c5.2 0 10-.2 13.6-3.2l-6.3-4.8C29.4 40.7 26.8 41 24 41c-5.3 0-9.8-3.2-11.4-7.7l-6.5 5C9.5 43.3 16.3 47 24 47z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.2 5.7l.1-.1 6.3 4.8c-.4.4 6.5-4.8 6.5-14.4 0-1.3-.1-2.6-.4-3.9z"/></svg>
        Google
      </button>
    </div>

    <div id="profileSection" class="profile-selector">
      <h2 class="text-center" style="font-size:1.25rem">¿Qué deseas gestionar?</h2>
      <div class="profile-grid">
        <a href="./negocio.html" class="profile-btn" style="--brand-color:var(--primary); --brand-bg:var(--primary-light)">
          <span class="profile-icon">🏢</span>
          <span class="profile-name">Negocio</span>
          <span class="profile-desc">Ventas y compras</span>
        </a>
        <a href="./personal.html" class="profile-btn" style="--brand-color:var(--success); --brand-bg:var(--success-light)">
          <span class="profile-icon">🏠</span>
          <span class="profile-name">Personal</span>
          <span class="profile-desc">Gastos y ahorros</span>
        </a>
      </div>
      <div class="user-info">
        <div class="user-chip">
          <div class="user-avatar" id="uAv">U</div>
          <span class="user-email" id="uEmail">...</span>
        </div>
        <button class="btn btn-secondary btn-sm" id="btnSignOut">Cerrar Sesión</button>
      </div>
    </div>
  </div>

  <script type="module">
    const $ = id => document.getElementById(id);
    let isRegister = false;

    const ERRS = {
      'auth/user-not-found': 'No existe esa cuenta.',
      'auth/wrong-password': 'Contraseña incorrecta.',
      'auth/email-already-in-use': 'El correo ya está registrado.',
      'auth/invalid-email': 'Correo electrónico inválido.',
      'auth/weak-password': 'La contraseña debe tener al menos 6 caracteres.',
      'auth/popup-closed-by-user': 'Operación cancelada.',
      'auth/invalid-credential': 'Credenciales incorrectas.'
    };

    function showError(msg) {
      const box = $('errorBox');
      box.textContent = msg;
      box.classList.add('show');
      setTimeout(() => box.classList.remove('show'), 4000);
    }

    // Esperar a que Firebase esté listo
    const checkFB = setInterval(() => {
      if (window.__fbReady && window.__FB) {
        clearInterval(checkFB);
        initUI();
      }
    }, 100);

    // Timeout de diagnóstico
    setTimeout(() => {
      if (!window.__fbReady) {
        clearInterval(checkFB);
        $('loadingText').innerHTML = '<span style="color:var(--danger)">⚠️ Error crítico de inicialización.<br>Por favor, recarga la página.</span>';
      }
    }, 15000);

    function initUI() {
      const FB = window.__FB;
      $('loading').style.display = 'none';
      $('authCard').style.display = 'block';

      // Toggle Login/Register
      $('tabLogin').onclick = () => {
        isRegister = false;
        $('tabLogin').classList.add('active');
        $('tabRegister').classList.remove('active');
        $('confirmPassGroup').style.display = 'none';
        $('btnSubmit').textContent = 'Iniciar Sesión';
      };
      $('tabRegister').onclick = () => {
        isRegister = true;
        $('tabRegister').classList.add('active');
        $('tabLogin').classList.remove('active');
        $('confirmPassGroup').style.display = 'block';
        $('btnSubmit').textContent = 'Crear Cuenta';
      };

      // Auth logic
      $('formAuth').onsubmit = async (e) => {
        e.preventDefault();
        const email = $('email').value.trim();
        const pass = $('password').value;
        
        try {
          if (isRegister) {
            const confirm = $('confirmPassword').value;
            if (pass !== confirm) throw { code: 'custom/pass-mismatch' };
            await FB.createUserWithEmailAndPassword(FB.auth, email, pass);
          } else {
            await FB.signInWithEmailAndPassword(FB.auth, email, pass);
          }
        } catch (err) {
          showError(ERRS[err.code] || err.message || 'Error en la operación');
        }
      };

      $('btnGoogle').onclick = async () => {
        try {
          await FB.signInWithPopup(FB.auth, new FB.GoogleAuthProvider());
        } catch (err) {
          showError(ERRS[err.code] || 'Error con Google');
        }
      };

      $('btnSignOut').onclick = () => FB.signOut(FB.auth);

      FB.onAuthStateChanged(FB.auth, user => {
        if (user) {
          $('loginSection').style.display = 'none';
          $('profileSection').style.display = 'block';
          $('uEmail').textContent = user.email;
          $('uAv').textContent = (user.email || 'U')[0].toUpperCase();
          sessionStorage.setItem('ca_uid', user.uid);
        } else {
          $('loginSection').style.display = 'block';
          $('profileSection').style.display = 'none';
          sessionStorage.clear();
        }
      });
    }
  </script>
</body>
</html>
