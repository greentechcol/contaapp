<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>ContaApp — Personal</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#16a34a" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script type="module" src="firebase-config.js"></script>
</head>
<body class="theme-personal">

  <!-- TOPBAR -->
  <header class="topbar">
    <a href="index.html" class="brand">
      <span class="brand-logo">📒</span>
      <span class="brand-name">Personal</span>
    </a>
    <div class="nav-tabs" id="mainNav">
      <a href="#" class="tab-link active" data-tab="resumen">Dashboard</a>
      <a href="#" class="tab-link" data-tab="movimientos">Gastos</a>
      <a href="#" class="tab-link" data-tab="metas">Metas</a>
      <a href="#" class="tab-link" data-tab="categorias">Categorías</a>
    </div>
    <div class="flex items-center gap-2" style="margin-left:auto">
      <div class="user-chip">
        <div class="user-avatar" id="userAvatar">U</div>
      </div>
      <button class="btn btn-secondary btn-sm" id="btnLogout">🚪</button>
    </div>
  </header>

  <main class="container">
    <!-- DASHBOARD -->
    <div id="tab-resumen" class="tab-content">
      <div class="grid" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap:1.5rem; margin-bottom:2rem;">
        <div class="card" style="border-left: 4px solid var(--success)">
          <p class="label">Disponible</p>
          <h2 id="dashSaldo" style="font-size:2rem">$0.00</h2>
        </div>
        <div class="card" style="border-left: 4px solid var(--danger)">
          <p class="label">Gastos del Mes</p>
          <h2 id="dashGastos" style="font-size:2rem">$0.00</h2>
        </div>
      </div>

      <div class="card">
        <h2 class="section-title mb-4">Gastos por Categoría</h2>
        <div style="height:250px">
          <canvas id="chartDonut"></canvas>
        </div>
      </div>
    </div>

    <!-- GASTOS -->
    <div id="tab-movimientos" class="tab-content hidden">
      <div class="card">
        <h2 class="section-title mb-4">Registrar Gasto</h2>
        <form id="formGasto">
          <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap:1rem;">
            <div class="form-group">
              <label class="label">Fecha</label>
              <input type="date" id="gasFecha" class="input" required>
            </div>
            <div class="form-group">
              <label class="label">Monto</label>
              <input type="number" id="gasMonto" class="input" placeholder="0.00" step="0.01" required>
            </div>
          </div>
          <div class="form-group mt-4">
            <label class="label">Categoría</label>
            <select id="gasCat" class="input" required>
              <!-- Dinámico -->
            </select>
          </div>
          <button type="submit" class="btn btn-primary w-100 mt-2" style="width:100%">Guardar Gasto</button>
        </form>
      </div>
    </div>

    <!-- METAS -->
    <div id="tab-metas" class="tab-content hidden">
      <div class="card">
        <h2 class="section-title mb-4">Metas de Ahorro</h2>
        <div id="metasContainer">
          <!-- Dinámico -->
          <div class="text-center text-muted py-8">No hay metas activas.</div>
        </div>
      </div>
    </div>
  </main>

  <script type="module">
    const $ = id => document.getElementById(id);
    
    window.addEventListener('firebase-ready', () => {
      const FB = window.__FB;
      
      // Navegación
      document.querySelectorAll('.tab-link').forEach(link => {
        link.onclick = (e) => {
          e.preventDefault();
          document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
          
          link.classList.add('active');
          $(`tab-${link.dataset.tab}`).classList.remove('hidden');
        };
      });

      // Auth
      FB.onAuthStateChanged(FB.auth, user => {
        if (!user) {
          window.location.href = 'index.html';
        } else {
          $('userAvatar').textContent = (user.email || 'U')[0].toUpperCase();
        }
      });

      $('btnLogout').onclick = () => FB.signOut(FB.auth);
    });
  </script>
</body>
</html>
