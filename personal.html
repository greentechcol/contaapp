<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>ContaApp — Personal</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#16a34a" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-overlay { position:fixed; inset:0; background:white; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:2000; }
    .spinner { width:40px; height:40px; border:4px solid #f1f5f9; border-top-color:#16a34a; border-radius:50%; animation:spin 1s linear infinite; }
    .badge { padding:0.2rem 0.5rem; border-radius:9999px; font-size:0.75rem; font-weight:700; }
    .badge-success { background:#dcfce7; color:#166534; }
    .badge-danger  { background:#fee2e2; color:#991b1b; }
    .badge-warning { background:#fef3c7; color:#92400e; }
    .section-title { font-size:1.125rem; font-weight:700; color:#0f172a; }
    .mb-4 { margin-bottom:1rem; }
    .mt-4 { margin-top:1rem; }
    .btn-sm { padding:0.375rem 0.75rem; font-size:0.8125rem; }
    .user-avatar { width:32px; height:32px; border-radius:50%; background:#16a34a; color:white; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.875rem; }
    .user-chip { display:flex; align-items:center; }
    .stat-label { font-size:0.7rem; text-transform:uppercase; color:#64748b; font-weight:700; margin-bottom:0.25rem; }
    #diagBox { background:#fee2e2; color:#991b1b; padding:1rem; border-radius:8px; margin:1rem; font-size:0.875rem; font-weight:600; display:none; border:1px solid #fecaca; }
  </style>
</head>
<body class="theme-personal">

  <div id="loading" class="loading-overlay">
    <div class="spinner"></div>
    <p style="margin-top:1rem;color:#64748b;" id="loadingMsg">Verificando sesión...</p>
  </div>

  <div id="diagBox"></div>

  <header class="topbar">
    <a href="index.html" class="brand">
      <span class="brand-logo">📒</span>
      <span class="brand-name">Personal</span>
    </a>
    <div class="nav-tabs">
      <a href="#" class="tab-link active" data-tab="resumen">Dashboard</a>
      <a href="#" class="tab-link" data-tab="movimientos">Gastos</a>
      <a href="#" class="tab-link" data-tab="metas">Metas</a>
    </div>
    <div class="flex items-center gap-2" style="margin-left:auto">
      <div class="user-chip">
        <div class="user-avatar" id="userAvatar">U</div>
      </div>
      <button class="btn btn-secondary btn-sm" id="btnLogout">🚪</button>
    </div>
  </header>

  <main class="container">

    <!-- DASHBOARD -->
    <div id="tab-resumen" class="tab-content">
      <div id="dashCards" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1.25rem;margin-bottom:1.5rem;"></div>
      <div class="card">
        <h2 class="section-title mb-4">Gastos por Categoría</h2>
        <div style="height:250px"><canvas id="chartDonut"></canvas></div>
      </div>
      <div class="card mt-4">
        <h2 class="section-title mb-4">Flujo Mensual</h2>
        <div style="height:280px"><canvas id="chartFlujo"></canvas></div>
      </div>
    </div>

    <!-- GASTOS -->
    <div id="tab-movimientos" class="tab-content hidden">
      <div class="card">
        <h2 class="section-title mb-4">Registrar Movimiento</h2>
        <form id="formMovimiento">
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;">
            <div class="form-group">
              <label class="label">Fecha</label>
              <input type="date" id="gasFecha" class="input" required>
            </div>
            <div class="form-group">
              <label class="label">Tipo</label>
              <select id="gasTipo" class="input" required>
                <option value="Ingreso">💰 Ingreso / Salario</option>
                <option value="Gasto">💸 Gasto</option>
                <option value="Ahorro">🏦 Aporte a meta</option>
              </select>
            </div>
            <div class="form-group">
              <label class="label">Monto</label>
              <input type="number" id="gasMonto" class="input" placeholder="0.00" step="0.01" min="0" required>
            </div>
          </div>
          <div class="form-group" style="margin-top:1rem;">
            <label class="label">Categoría</label>
            <select id="gasCat" class="input" required></select>
          </div>
          <div class="form-group" style="margin-top:1rem;">
            <label class="label">Descripción</label>
            <input type="text" id="gasDesc" class="input" placeholder="Ej: Mercado, Netflix, etc.">
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.75rem" id="btnGuardar">
            Guardar
          </button>
        </form>
      </div>
      <div class="card mt-4">
        <h2 class="section-title mb-4">Historial Reciente</h2>
        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr><th>Fecha</th><th>Tipo</th><th>Categoría</th><th style="text-align:right">Monto</th><th></th></tr>
            </thead>
            <tbody id="tbodyMov"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- METAS -->
    <div id="tab-metas" class="tab-content hidden">
      <div class="card">
        <h2 class="section-title mb-4">Metas de Ahorro</h2>
        <div id="metasContainer" style="display:grid;gap:1rem;"></div>
      </div>
    </div>

  </main>

  <!--
    ═══════════════════════════════════════════════════════
    CAUSA RAÍZ DEL BUG DE "Sincronización infinita":
    La arquitectura original tenía DOS <script type="module">
    separados. El primero disparaba window.dispatchEvent
    ('firebase-ready'). El segundo escuchaba ese evento.

    PROBLEMA: Los módulos ES se ejecutan de forma diferida.
    Cuando el segundo módulo registra su listener, el evento
    YA fue disparado → el listener NUNCA se activa →
    onAuthStateChanged NUNCA corre → el loading NUNCA
    desaparece → "sincronización infinita".

    SOLUCIÓN: Un único <script type="module"> que importa
    Firebase directamente y registra onAuthStateChanged
    de inmediato. El callback oculta el loading al resolverse.
    ═══════════════════════════════════════════════════════
  -->
  <script type="module">
    // ── IMPORTS ──────────────────────────────────────────────────
    import { initializeApp }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore, doc, collection,
      addDoc, deleteDoc,
      onSnapshot, query, orderBy
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // ── FIREBASE INIT ─────────────────────────────────────────────
    const app  = initializeApp({
      apiKey:            "AIzaSyBRcdPOgC3jU4Br81r3lC5KK2ZowBSns80",
      authDomain:        "contaappgreentech.firebaseapp.com",
      projectId:         "contaappgreentech",
      storageBucket:     "contaappgreentech.firebasestorage.app",
      messagingSenderId: "672661191582",
      appId:             "1:672661191582:web:babf8b97b69925028eb48f"
    });
    const auth = getAuth(app);
    const db   = getFirestore(app);

    // ── ESTADO ────────────────────────────────────────────────────
    const $ = id => document.getElementById(id);
    let DB = { movimientos: [], categorias: [], metas: [] };
    let chartDonut = null, chartFlujo = null;
    let unsubConfig = null, unsubMovs = null;

    const DEFAULT_CATS = [
      { nombre: 'Alimentación',   icono: '🍔' },
      { nombre: 'Transporte',     icono: '🚌' },
      { nombre: 'Vivienda',       icono: '🏠' },
      { nombre: 'Salud',          icono: '💊' },
      { nombre: 'Entretenimiento',icono: '🎬' },
      { nombre: 'Educación',      icono: '📚' },
      { nombre: 'Salario',        icono: '💰' },
      { nombre: 'Otros',          icono: '📦' }
    ];

    // ── DIAGNÓSTICO ───────────────────────────────────────────────
    function showDiag(msg) {
      const b = $('diagBox');
      b.textContent = '⚠️ ' + msg;
      b.style.display = 'block';
    }

    // ── NAVEGACIÓN ────────────────────────────────────────────────
    document.querySelectorAll('.tab-link').forEach(link => {
      link.addEventListener('click', e => {
        e.preventDefault();
        document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
        link.classList.add('active');
        $('tab-' + link.dataset.tab).classList.remove('hidden');
      });
    });

    // ── AUTH GUARD ────────────────────────────────────────────────
    onAuthStateChanged(auth, user => {
      if (!user) {
        window.location.replace('index.html');
        return;
      }
      $('loading').style.display = 'none';
      $('userAvatar').textContent = (user.email || 'U')[0].toUpperCase();
      initData(user.uid);
    });

    $('btnLogout').addEventListener('click', () => signOut(auth));

    // ── INIT DATA ─────────────────────────────────────────────────
    function initData(uid) {
      if (unsubConfig) unsubConfig();
      if (unsubMovs)   unsubMovs();

      // Config: categorías y metas
      unsubConfig = onSnapshot(
        doc(db, 'users', uid, 'config', 'personal'),
        snap => {
          if (snap.exists()) {
            const d = snap.data();
            DB.categorias = d.categorias || DEFAULT_CATS;
            DB.metas      = d.metas      || [];
          } else {
            DB.categorias = DEFAULT_CATS;
            DB.metas      = [];
          }
          renderSelects();
          renderMetas();
        },
        err => {
          console.warn('Config error:', err.code);
          DB.categorias = DEFAULT_CATS;
          renderSelects();
        }
      );

      // Movimientos
      unsubMovs = onSnapshot(
        query(collection(db, 'users', uid, 'movimientos_personal'), orderBy('fecha', 'desc')),
        snap => {
          DB.movimientos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          renderDashboard();
          renderMovimientos();
          renderMetas();
        },
        err => {
          console.warn('Movimientos error:', err.code, err.message);
          if (err.code === 'failed-precondition') {
            showDiag('Falta índice en Firestore. Revisa la consola de Firebase para crearlo.');
          } else {
            showDiag('Error cargando datos: ' + err.message);
          }
          DB.movimientos = [];
          renderDashboard();
          renderMovimientos();
        }
      );
    }

    // ── DASHBOARD ─────────────────────────────────────────────────
    function renderDashboard() {
      let ingresos = 0, gastos = 0, ahorros = 0;
      DB.movimientos.forEach(m => {
        const v = parseFloat(m.monto) || 0;
        if      (m.tipo === 'Ingreso') ingresos += v;
        else if (m.tipo === 'Gasto')   gastos   += v;
        else if (m.tipo === 'Ahorro')  ahorros  += v;
      });
      const disponible = ingresos - gastos - ahorros;

      $('dashCards').innerHTML = [
        { label: 'Ingresos Totales', value: ingresos,   color: '#16a34a' },
        { label: 'Gastos Totales',   value: gastos,     color: '#dc2626' },
        { label: 'Ahorros / Metas',  value: ahorros,    color: '#d97706' },
        { label: 'Saldo Disponible', value: disponible, color: '#2563eb' }
      ].map(({ label, value, color }) => `
        <div class="card" style="border-left:4px solid ${color};margin-bottom:0;padding:1.25rem">
          <p class="stat-label">${label}</p>
          <h2 style="font-size:1.65rem;font-weight:800;color:${color}">
            $${value.toLocaleString('es-CO')}
          </h2>
        </div>`).join('');

      renderCharts(ingresos, gastos, ahorros);
    }

    // ── MOVIMIENTOS ───────────────────────────────────────────────
    function renderMovimientos() {
      const tbody = $('tbodyMov');
      const items = DB.movimientos.slice(0, 20);
      if (!items.length) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:#94a3b8;padding:2rem">
          Sin movimientos registrados aún</td></tr>`;
        return;
      }
      tbody.innerHTML = items.map(m => {
        const tipo    = m.tipo || '';
        const badgeCls = tipo === 'Ingreso' ? 'success' : tipo === 'Gasto' ? 'danger' : 'warning';
        const color    = tipo === 'Ingreso' ? '#16a34a' : '#dc2626';
        const partes   = (m.fecha || '').split('-');
        const fechaFmt = partes.length === 3 ? `${partes[2]}/${partes[1]}` : m.fecha;
        return `
          <tr>
            <td>${fechaFmt}</td>
            <td><span class="badge badge-${badgeCls}">${tipo[0] || '?'}</span></td>
            <td>${m.categoria || '-'}</td>
            <td style="font-weight:700;color:${color};text-align:right">
              $${(parseFloat(m.monto) || 0).toLocaleString('es-CO')}
            </td>
            <td><button class="btn btn-secondary btn-sm" data-id="${m.id}" data-action="del">🗑️</button></td>
          </tr>`;
      }).join('');
    }

    // Delegación de eventos
    $('tbodyMov').addEventListener('click', async e => {
      const btn = e.target.closest('[data-action="del"]');
      if (!btn) return;
      if (!confirm('¿Eliminar movimiento?')) return;
      const uid = auth.currentUser?.uid;
      if (!uid) return;
      try {
        await deleteDoc(doc(db, 'users', uid, 'movimientos_personal', btn.dataset.id));
      } catch (err) {
        alert('Error al eliminar: ' + err.message);
      }
    });

    // ── METAS ─────────────────────────────────────────────────────
    function renderMetas() {
      const container = $('metasContainer');
      if (!DB.metas.length) {
        container.innerHTML = `<p style="text-align:center;color:#94a3b8;padding:2rem">
          No hay metas activas.</p>`;
        return;
      }
      container.innerHTML = DB.metas.map(meta => {
        const ahorrado = DB.movimientos
          .filter(m => m.tipo === 'Ahorro' && m.metaId === meta.id)
          .reduce((acc, m) => acc + (parseFloat(m.monto) || 0), 0);
        const objetivo = parseFloat(meta.objetivo) || 1;
        const pct = Math.min(100, Math.round((ahorrado / objetivo) * 100));
        return `
          <div class="card">
            <div class="flex justify-between items-center mb-4">
              <span style="font-weight:800">${meta.icono || '🎯'} ${meta.nombre}</span>
              <span style="font-size:0.875rem;color:#64748b">
                $${ahorrado.toLocaleString('es-CO')} / $${objetivo.toLocaleString('es-CO')}
              </span>
            </div>
            <div style="height:8px;background:#f1f5f9;border-radius:4px;overflow:hidden">
              <div style="width:${pct}%;height:100%;background:#16a34a;transition:width 0.5s"></div>
            </div>
            <p style="font-size:0.75rem;margin-top:0.5rem;text-align:right;font-weight:700">${pct}% completado</p>
          </div>`;
      }).join('');
    }

    // ── SELECTS ───────────────────────────────────────────────────
    function renderSelects() {
      $('gasCat').innerHTML = DB.categorias.map(c =>
        `<option value="${c.nombre}">${c.icono || ''} ${c.nombre}</option>`
      ).join('');
    }

    // ── CHARTS ────────────────────────────────────────────────────
    function renderCharts(ing, gas, aho) {
      // Donut — gastos por categoría
      const catMap = {};
      DB.movimientos.filter(m => m.tipo === 'Gasto').forEach(m => {
        const k = m.categoria || 'Sin categoría';
        catMap[k] = (catMap[k] || 0) + (parseFloat(m.monto) || 0);
      });

      const ctxD = $('chartDonut');
      if (chartDonut) { chartDonut.destroy(); chartDonut = null; }
      chartDonut = new Chart(ctxD.getContext('2d'), {
        type: 'doughnut',
        data: {
          labels: Object.keys(catMap).length ? Object.keys(catMap) : ['Sin datos'],
          datasets: [{
            data: Object.values(catMap).length ? Object.values(catMap) : [1],
            backgroundColor: ['#ef4444','#f97316','#f59e0b','#10b981','#3b82f6','#8b5cf6','#ec4899','#14b8a6'],
            borderWidth: 2
          }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
      });

      // Barras — flujo
      const ctxF = $('chartFlujo');
      if (chartFlujo) { chartFlujo.destroy(); chartFlujo = null; }
      chartFlujo = new Chart(ctxF.getContext('2d'), {
        type: 'bar',
        data: {
          labels: ['Ingresos', 'Gastos', 'Ahorros'],
          datasets: [{
            data: [ing, gas, aho],
            backgroundColor: ['#22c55e', '#ef4444', '#f59e0b'],
            borderRadius: 6
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } }
        }
      });
    }

    // ── GUARDAR MOVIMIENTO ────────────────────────────────────────
    $('formMovimiento').addEventListener('submit', async e => {
      e.preventDefault();
      const uid = auth.currentUser?.uid;
      if (!uid) return;

      const btn = $('btnGuardar');
      btn.disabled = true;
      btn.textContent = 'Guardando...';

      try {
        await addDoc(collection(db, 'users', uid, 'movimientos_personal'), {
          fecha:       $('gasFecha').value,
          tipo:        $('gasTipo').value,
          categoria:   $('gasCat').value,
          monto:       parseFloat($('gasMonto').value) || 0,
          descripcion: $('gasDesc').value.trim(),
          creadoEn:    new Date().toISOString()
        });
        e.target.reset();
      } catch (err) {
        console.error('Error guardando:', err);
        alert('Error al guardar: ' + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Guardar';
      }
    });

  </script>
</body>
</html>
