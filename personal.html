<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>ContaApp — Personal</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#16a34a" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, onSnapshot, collection, deleteDoc, query, orderBy, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBRcdPOgC3jU4Br81r3lC5KK2ZowBSns80",
      authDomain: "contaappgreentech.firebaseapp.com",
      projectId: "contaappgreentech",
      storageBucket: "contaappgreentech.firebasestorage.app",
      messagingSenderId: "672661191582",
      appId: "1:672661191582:web:babf8b97b69925028eb48f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.__FB = { 
      auth, db, GoogleAuthProvider, signInWithPopup, 
      signInWithEmailAndPassword, createUserWithEmailAndPassword, 
      onAuthStateChanged, signOut, doc, getDoc, setDoc, 
      onSnapshot, collection, deleteDoc, query, orderBy, writeBatch 
    };
    window.__fbReady = true;
    window.dispatchEvent(new Event('firebase-ready'));
  </script>
</head>
<body class="theme-personal">

  <div id="loading" class="loading-overlay" style="position:fixed; inset:0; background:white; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:2000;">
    <div class="spinner" style="width:40px; height:40px; border:4px solid #f1f5f9; border-top-color:#16a34a; border-radius:50%; animation:spin 1s linear infinite;"></div>
    <p style="margin-top:1rem; color:#64748b;">Cargando tus finanzas...</p>
  </div>

  <header class="topbar">
    <a href="index.html" class="brand">
      <span class="brand-logo">📒</span>
      <span class="brand-name">Personal</span>
    </a>
    <div class="nav-tabs" id="mainNav">
      <a href="#" class="tab-link active" data-tab="resumen">Dashboard</a>
      <a href="#" class="tab-link" data-tab="movimientos">Gastos</a>
      <a href="#" class="tab-link" data-tab="metas">Metas</a>
      <a href="#" class="tab-link" data-tab="categorias">Categorías</a>
    </div>
    <div class="flex items-center gap-2" style="margin-left:auto">
      <div class="user-chip">
        <div class="user-avatar" id="userAvatar">U</div>
      </div>
      <button class="btn btn-secondary btn-sm" id="btnLogout">🚪</button>
    </div>
  </header>

  <main class="container">
    <!-- DASHBOARD -->
    <div id="tab-resumen" class="tab-content">
      <div class="grid" id="dashCards" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap:1.5rem; margin-bottom:2rem;">
        <!-- Cargado dinámicamente -->
      </div>

      <div class="card">
        <h2 class="section-title mb-4">Gastos por Categoría</h2>
        <div style="height:250px">
          <canvas id="chartDonut"></canvas>
        </div>
      </div>
      
      <div class="card mt-4">
        <h2 class="section-title mb-4">Flujo Mensual</h2>
        <div style="height:300px">
          <canvas id="chartFlujo"></canvas>
        </div>
      </div>
    </div>

    <!-- GASTOS -->
    <div id="tab-movimientos" class="tab-content hidden">
      <div class="card">
        <h2 class="section-title mb-4">Registrar Movimiento</h2>
        <form id="formMovimiento">
          <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap:1rem;">
            <div class="form-group">
              <label class="label">Fecha</label>
              <input type="date" id="gasFecha" class="input" required>
            </div>
            <div class="form-group">
              <label class="label">Tipo</label>
              <select id="gasTipo" class="input" required>
                <option value="Ingreso">💰 Ingreso / Salario</option>
                <option value="Gasto">💸 Gasto</option>
                <option value="Ahorro">🏦 Aporte a meta</option>
              </select>
            </div>
            <div class="form-group">
              <label class="label">Monto</label>
              <input type="number" id="gasMonto" class="input" placeholder="0.00" step="0.01" required>
            </div>
          </div>
          <div class="form-group mt-4">
            <label class="label">Categoría</label>
            <select id="gasCat" class="input" required></select>
          </div>
          <div class="form-group mt-4">
            <label class="label">Descripción</label>
            <input type="text" id="gasDesc" class="input" placeholder="Ej: Mercado, Netflix, etc.">
          </div>
          <button type="submit" class="btn btn-primary w-100 mt-2" style="width:100%">Guardar</button>
        </form>
      </div>

      <div class="card mt-4">
        <h2 class="section-title mb-4">Historial Reciente</h2>
        <div class="table-wrap">
          <table class="table">
            <thead>
              <tr>
                <th>Fecha</th>
                <th>Tipo</th>
                <th>Categoría</th>
                <th>Monto</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="tbodyMov"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- METAS -->
    <div id="tab-metas" class="tab-content hidden">
      <div class="card">
        <h2 class="section-title mb-4">Metas de Ahorro</h2>
        <div id="metasContainer" class="grid" style="display:grid; gap:1rem;">
          <!-- Cargado dinámicamente -->
        </div>
      </div>
    </div>
  </main>

  <script type="module">
    const $ = id => document.getElementById(id);
    let DB = { movimientos: [], categorias: [], metas: [], cuentas: [] };
    let chartDonut = null, chartFlujo = null;

    window.addEventListener('firebase-ready', () => {
      const FB = window.__FB;
      
      // Navegación
      document.querySelectorAll('.tab-link').forEach(link => {
        link.onclick = (e) => {
          e.preventDefault();
          document.querySelectorAll('.tab-link').forEach(l => l.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
          link.classList.add('active');
          $(`tab-${link.dataset.tab}`).classList.remove('hidden');
        };
      });

      FB.onAuthStateChanged(FB.auth, user => {
        if (!user) {
          window.location.href = 'index.html';
        } else {
          $('userAvatar').textContent = (user.email || 'U')[0].toUpperCase();
          initData(user.uid);
        }
      });

      $('btnLogout').onclick = () => FB.signOut(FB.auth);
    });

    async function initData(uid) {
      const FB = window.__FB;
      const userRef = FB.doc(FB.db, 'users', uid);
      
      // Cargar Configuración (Categorías, Metas)
      FB.onSnapshot(FB.doc(userRef, 'config', 'personal'), (doc) => {
        if (doc.exists()) {
          const data = doc.data();
          DB.categorias = data.categorias || [];
          DB.metas = data.metas || [];
          updateUI();
        }
      });

      // Cargar Movimientos
      const movQuery = FB.query(FB.collection(userRef, 'movimientos_personal'), FB.orderBy('fecha', 'desc'));
      FB.onSnapshot(movQuery, (snap) => {
        DB.movimientos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        $('loading').style.display = 'none';
        updateUI();
      });
    }

    function updateUI() {
      renderDashboard();
      renderMovimientos();
      renderMetas();
      renderSelects();
    }

    function renderDashboard() {
      const dashCards = $('dashCards');
      let ingresos = 0, gastos = 0, ahorros = 0;
      
      DB.movimientos.forEach(m => {
        const val = parseFloat(m.monto) || 0;
        if (m.tipo === 'Ingreso') ingresos += val;
        else if (m.tipo === 'Gasto') gastos += val;
        else if (m.tipo === 'Ahorro') ahorros += val;
      });

      dashCards.innerHTML = `
        <div class="card" style="border-left: 4px solid #16a34a">
          <p class="label">Ingresos Totales</p>
          <h2 style="font-size:1.75rem">$${ingresos.toLocaleString()}</h2>
        </div>
        <div class="card" style="border-left: 4px solid #dc2626">
          <p class="label">Gastos Totales</p>
          <h2 style="font-size:1.75rem">$${gastos.toLocaleString()}</h2>
        </div>
        <div class="card" style="border-left: 4px solid #d97706">
          <p class="label">Ahorros / Metas</p>
          <h2 style="font-size:1.75rem">$${ahorros.toLocaleString()}</h2>
        </div>
        <div class="card" style="border-left: 4px solid #2563eb">
          <p class="label">Saldo Disponible</p>
          <h2 style="font-size:1.75rem">$${(ingresos - gastos - ahorros).toLocaleString()}</h2>
        </div>
      `;

      renderCharts(ingresos, gastos, ahorros);
    }

    function renderMovimientos() {
      const tbody = $('tbodyMov');
      tbody.innerHTML = DB.movimientos.slice(0, 15).map(m => `
        <tr>
          <td>${m.fecha.split('-').slice(1).join('/')}</td>
          <td><span class="badge badge-${m.tipo === 'Ingreso' ? 'success' : m.tipo === 'Gasto' ? 'danger' : 'warning'}">${m.tipo[0]}</span></td>
          <td>${m.categoria}</td>
          <td style="font-weight:700; color:${m.tipo === 'Ingreso' ? 'green' : 'red'}">$${m.monto.toLocaleString()}</td>
          <td><button class="btn btn-secondary btn-sm" onclick="eliminarMov('${m.id}')">🗑️</button></td>
        </tr>
      `).join('');
    }

    function renderMetas() {
      const container = $('metasContainer');
      if (!DB.metas.length) {
        container.innerHTML = '<div class="text-center text-muted py-8">No hay metas activas.</div>';
        return;
      }
      
      container.innerHTML = DB.metas.map(meta => {
        const ahorrado = DB.movimientos
          .filter(m => m.tipo === 'Ahorro' && m.metaId === meta.id)
          .reduce((acc, m) => acc + m.monto, 0);
        const pct = Math.min(100, Math.round((ahorrado / meta.objetivo) * 100));
        
        return `
          <div class="card">
            <div class="flex justify-between items-center mb-2">
              <span style="font-weight:800">${meta.icono || '🎯'} ${meta.nombre}</span>
              <span style="font-size:0.875rem; color:#64748b">$${ahorrado.toLocaleString()} / $${meta.objetivo.toLocaleString()}</span>
            </div>
            <div style="height:8px; background:#f1f5f9; border-radius:4px; overflow:hidden">
              <div style="width:${pct}%; height:100%; background:#16a34a; transition:width 0.5s"></div>
            </div>
            <p style="font-size:0.75rem; margin-top:0.5rem; text-align:right; font-weight:700">${pct}% completado</p>
          </div>
        `;
      }).join('');
    }

    function renderSelects() {
      const catSelect = $('gasCat');
      catSelect.innerHTML = DB.categorias.map(c => `<option value="${c.nombre}">${c.icono || ''} ${c.nombre}</option>`).join('');
    }

    function renderCharts(ing, gas, aho) {
      // Donut Chart (Gastos por categoría)
      const catMap = {};
      DB.movimientos.filter(m => m.tipo === 'Gasto').forEach(m => {
        catMap[m.categoria] = (catMap[m.categoria] || 0) + m.monto;
      });
      
      const ctxD = $('chartDonut').getContext('2d');
      if (chartDonut) chartDonut.destroy();
      chartDonut = new Chart(ctxD, {
        type: 'doughnut',
        data: {
          labels: Object.keys(catMap),
          datasets: [{ data: Object.values(catMap), backgroundColor: ['#ef4444', '#f97316', '#f59e0b', '#10b981', '#3b82f6', '#8b5cf6'] }]
        },
        options: { responsive: true, maintainAspectRatio: false }
      });

      // Bar Chart (Flujo)
      const ctxF = $('chartFlujo').getContext('2d');
      if (chartFlujo) chartFlujo.destroy();
      chartFlujo = new Chart(ctxF, {
        type: 'bar',
        data: {
          labels: ['Ingresos', 'Gastos', 'Ahorros'],
          datasets: [{ data: [ing, gas, aho], backgroundColor: ['#22c55e', '#ef4444', '#f59e0b'], borderRadius: 6 }]
        },
        options: { responsive: true, maintainAspectRatio: false }
      });
    }

    window.eliminarMov = async (id) => {
      if (!confirm('¿Eliminar movimiento?')) return;
      const FB = window.__FB;
      const uid = FB.auth.currentUser.uid;
      await FB.deleteDoc(FB.doc(FB.db, 'users', uid, 'movimientos_personal', id));
    };

    $('formMovimiento').onsubmit = async (e) => {
      e.preventDefault();
      const FB = window.__FB;
      const uid = FB.auth.currentUser.uid;
      const mov = {
        fecha: $('gasFecha').value,
        tipo: $('gasTipo').value,
        categoria: $('gasCat').value,
        monto: parseFloat($('gasMonto').value),
        descripcion: $('gasDesc').value
      };
      await FB.setDoc(FB.doc(FB.collection(FB.db, 'users', uid, 'movimientos_personal')), mov);
      $('formMovimiento').reset();
    };
  </script>

  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .badge { padding: 0.2rem 0.4rem; border-radius: 6px; font-size: 0.7rem; font-weight: 800; color: white; }
    .badge-success { background: #22c55e; }
    .badge-danger { background: #ef4444; }
    .badge-warning { background: #f59e0b; }
    .label { font-size: 0.75rem; text-transform: uppercase; color: #64748b; font-weight: 700; margin-bottom: 0.25rem; }
  </style>
</body>
</html>
